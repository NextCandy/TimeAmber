name = "timeamber-server"
main = "src/index.ts"
compatibility_date = "2024-12-30"
compatibility_flags = ["nodejs_compat"]

[vars]
# 非敏感配置变量（敏感的用 wrangler secret put）
BLOG_NAME = "TimeAmber"
# 对外公开域名（用于 sitemap.xml / robots.txt 的绝对 URL）
SITE_ORIGIN = "https://timeamber.com"
NOTION_DATA_SOURCE_ID = "22837041-b78c-81d8-9670-000b9d50c21b"
SHUDONG_BASE_URL = "https://shudong.org"
MEARCHIVE_BASE_URL = "https://mearchive.com"
ARCHIVE_SYNC_MAX_PAGES = "10"
ARCHIVE_SYNC_MAX_CONTENT_CHARS = "60000"
NOTION_SYNC_MAX_SUBREQUESTS = "40"
# 运行时默认不做建表/补列；部署流程负责迁移与 schema reconcile。
AUTO_SCHEMA_MIGRATION = "false"

# D1 数据库绑定
[[d1_databases]]
binding = "DB"
database_name = "timeamber-db"
database_id = "005fcc1e-7fe0-452a-84f5-f688ac6ae85a"
migrations_dir = "src/migrations"

# R2 存储桶绑定
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "timeamber-assets"

# Analytics Engine 数据集绑定（CF 专属增强分析模块）
# 灵感来源: HanAnalytics (MIT) — https://github.com/uxiaohan/HanAnalytics
# 仅在 Cloudflare 部署时生效，Turso/PG 后端会自动跳过 AE 写入与查询
[[analytics_engine_datasets]]
binding = "AE"
dataset = "timeamber_analytics"

# 定时触发器 (每 1 分钟执行一次)
[triggers]
crons = ["* * * * *"]
