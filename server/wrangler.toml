name = "monolith-server"
main = "src/index.ts"
compatibility_date = "2024-12-30"
compatibility_flags = ["nodejs_compat"]

[vars]
# 非敏感配置变量（敏感的用 wrangler secret put）
BLOG_NAME = "Time Amber"

# D1 数据库绑定
[[d1_databases]]
binding = "DB"
database_name = "monolith-db"
database_id = "304c7ff8-6412-4bb6-83bb-2a63d81e1e80"
migrations_dir = "src/migrations"

# R2 存储桶绑定
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "monolith-assets"

# 定时触发器 (每 1 分钟执行一次)
[triggers]
crons = ["* * * * *"]
