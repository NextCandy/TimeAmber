<!DOCTYPE html>
<html lang="zh-CN" class="dark h-full antialiased">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="时光琥珀，一个用文字封存瞬间的个人博客。时间在此凝成透明松脂，包裹日常的温度与思想的微光。" />
    <meta name="theme-color" content="#0a0a0f" />

    <!-- Open Graph 默认标签（SPA 首次抓取时的兜底） -->
    <meta property="og:title" content="TimeAmber — 时光成珀，字字如初" />
    <meta property="og:description" content="时光琥珀，一个用文字封存瞬间的个人博客。时间在此凝成透明松脂，包裹日常的温度与思想的微光。" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="TimeAmber" />
    <meta property="og:locale" content="zh_CN" />
    <meta property="og:image" content="https://i.see.you/2026/04/28/7fmF/TimeAmberSVG.svg" />

    <!-- Twitter Card 默认标签 -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="TimeAmber — 时光成珀，字字如初" />
    <meta name="twitter:description" content="时光琥珀，一个用文字封存瞬间的个人博客。" />
    <meta name="twitter:image" content="https://i.see.you/2026/04/28/7fmF/TimeAmberSVG.svg" />

    <title>TimeAmber — 时光成珀，字字如初</title>
    <link rel="icon" type="image/svg+xml" href="https://i.see.you/2026/04/28/7fmF/TimeAmberSVG.svg" />
    <link rel="alternate" type="application/rss+xml" title="TimeAmber RSS" href="/rss.xml" />
  </head>
  <body class="min-h-full flex flex-col font-sans bg-background text-foreground">
    <!-- 主题初始化：在 React 加载前设置 data-theme，防止闪烁 -->
    <script>
      (function(){
        var t = localStorage.getItem('theme') || 'dark';
        var d = t === 'system'
          ? (window.matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light')
          : t;
        document.documentElement.setAttribute('data-theme', d);
        // 同步 theme-color
        var m = document.querySelector('meta[name="theme-color"]');
        if (m) m.setAttribute('content', d === 'light' ? '#ffffff' : '#0a0a0f');
      })();
    </script>
    <div id="root" class="min-h-screen flex flex-col"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
