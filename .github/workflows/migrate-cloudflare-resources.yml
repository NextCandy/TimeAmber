name: Migrate Cloudflare Resources

on:
  workflow_dispatch:

jobs:
  migrate:
    name: Create TimeAmber D1/R2 resources
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      OLD_D1_NAME: monolith-db
      NEW_D1_NAME: timeamber-db
      NEW_R2_BUCKET: timeamber-assets
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install Wrangler
        run: npm ci --include=optional

      - name: Create or reuse D1 database
        id: d1
        working-directory: server
        run: |
          set -euo pipefail
          list_json="$(npx wrangler d1 list --json)"
          db_id="$(node -e 'const dbs=JSON.parse(process.argv[1]); const db=dbs.find((d)=>d.name===process.env.NEW_D1_NAME); process.stdout.write(db?.uuid || db?.id || "");' "$list_json")"

          if [ -z "$db_id" ]; then
            create_output="$(npx wrangler d1 create "$NEW_D1_NAME" --location apac)"
            printf '%s\n' "$create_output"
            list_json="$(npx wrangler d1 list --json)"
            db_id="$(node -e 'const dbs=JSON.parse(process.argv[1]); const db=dbs.find((d)=>d.name===process.env.NEW_D1_NAME); if(!db) process.exit(1); process.stdout.write(db.uuid || db.id);' "$list_json")"
            echo "created=true" >> "$GITHUB_OUTPUT"
          else
            echo "D1 database $NEW_D1_NAME already exists."
            echo "created=false" >> "$GITHUB_OUTPUT"
          fi

          echo "database_id=$db_id" >> "$GITHUB_OUTPUT"
          echo "TIMEAMBER_D1_ID=$db_id"

      - name: Copy D1 data
        if: steps.d1.outputs.created == 'true'
        working-directory: server
        run: |
          set -euo pipefail
          npx wrangler d1 export "$OLD_D1_NAME" --remote --output=/tmp/timeamber-d1-export.sql
          npx wrangler d1 execute "$NEW_D1_NAME" --remote --file=/tmp/timeamber-d1-export.sql --yes
          npx wrangler d1 execute "$NEW_D1_NAME" --remote --command="SELECT 'posts' AS table_name, COUNT(*) AS total FROM posts UNION ALL SELECT 'settings', COUNT(*) FROM settings UNION ALL SELECT 'tags', COUNT(*) FROM tags;" --json

      - name: Create or reuse R2 bucket
        working-directory: server
        run: |
          set -euo pipefail
          if npx wrangler r2 bucket list | grep -q "^${NEW_R2_BUCKET}\b"; then
            echo "R2 bucket $NEW_R2_BUCKET already exists."
          else
            npx wrangler r2 bucket create "$NEW_R2_BUCKET" --location apac
          fi

      - name: Print binding block
        run: |
          cat <<EOF
          Use this binding in server/wrangler.toml:

          [[d1_databases]]
          binding = "DB"
          database_name = "timeamber-db"
          database_id = "${{ steps.d1.outputs.database_id }}"
          migrations_dir = "src/migrations"

          [[r2_buckets]]
          binding = "BUCKET"
          bucket_name = "timeamber-assets"
          EOF
