name: Update Brand Image

on:
  workflow_dispatch:
    inputs:
      image_url:
        description: Brand/default image URL
        required: false
        type: string
      clear_default_cover:
        description: Clear matched default post covers instead of setting image_url
        required: false
        default: false
        type: boolean

jobs:
  update:
    name: Update TimeAmber brand/default images
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      IMAGE_URL: ${{ inputs.image_url }}
      CLEAR_DEFAULT_COVER: ${{ inputs.clear_default_cover }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --include=optional

      - name: Update D1 default post covers
        working-directory: server
        run: |
          set -euo pipefail
          next_cover="${IMAGE_URL}"
          if [ "${CLEAR_DEFAULT_COVER}" = "true" ]; then
            next_cover=""
          fi
          sql="UPDATE posts SET cover_image='${next_cover}', updated_at=datetime('now') WHERE cover_image IS NULL OR cover_image='' OR cover_image='/og-default.png' OR cover_image LIKE '%gemini-svg-3.svg' OR cover_image LIKE '%ChatGPT-Image-2026428-08_56_28.png' OR cover_image LIKE '%TimeAmberPNG.png';"
          npx wrangler d1 execute timeamber-db --remote --command "$sql" --json
          npx wrangler d1 execute timeamber-db --remote --command "SELECT id, slug, cover_image FROM posts ORDER BY id;" --json
