name: Cleanup Old Cloudflare Resources

on:
  workflow_dispatch:

jobs:
  cleanup:
    name: Delete migrated legacy resources
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      ACTIVE_PAGES_PROJECT: timeamber-client
      OLD_D1_NAME: monolith-db
      OLD_R2_BUCKET: monolith-assets
      OLD_WORKER_NAME: monolith-server
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --include=optional

      - name: Verify active site before cleanup
        run: |
          set -euo pipefail
          curl -fsS https://timeamber.com/api/health
          curl -fsS https://timeamber.com/sitemap.xml | grep -q 'https://timeamber.com/'

      - name: Delete legacy Pages projects
        run: |
          set -euo pipefail
          for project in timeamber-client-legacy monolith-client monolith-client-cil monolith-client-cil-legacy; do
            if [ "$project" = "$ACTIVE_PAGES_PROJECT" ]; then
              continue
            fi
            echo "Deleting Pages project: $project"
            npx wrangler pages project delete "$project" --yes || true
          done

      - name: Delete old Worker if present
        run: |
          set -euo pipefail
          npx wrangler delete "$OLD_WORKER_NAME" --force || true

      - name: Delete old D1 database
        working-directory: server
        run: |
          set -euo pipefail
          d1_json="$(npx wrangler d1 list --json)"
          if node -e 'const dbs=JSON.parse(process.argv[1]); process.exit(dbs.some((db)=>db.name===process.env.OLD_D1_NAME) ? 0 : 1)' "$d1_json"; then
            echo "Deleting D1 database: $OLD_D1_NAME"
            npx wrangler d1 delete "$OLD_D1_NAME" --skip-confirmation
          else
            echo "D1 database $OLD_D1_NAME not found."
          fi

      - name: Delete old R2 bucket
        working-directory: server
        run: |
          set -euo pipefail
          if npx wrangler r2 bucket list | grep -q "name:[[:space:]]*${OLD_R2_BUCKET}$"; then
            echo "Deleting R2 bucket: $OLD_R2_BUCKET"
            if ! printf 'y\n' | npx wrangler r2 bucket delete "$OLD_R2_BUCKET"; then
              echo "Bucket is not empty. Deploying temporary cleanup Worker."
              cleanup_dir="$(mktemp -d)"
              cleanup_token="cleanup-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
              {
                printf '%s\n' 'export default {'
                printf '%s\n' '  async fetch(request, env) {'
                printf '%s\n' '    const url = new URL(request.url);'
                printf '%s\n' '    if (url.searchParams.get("token") !== env.CLEANUP_TOKEN) {'
                printf '%s\n' '      return new Response("Forbidden", { status: 403 });'
                printf '%s\n' '    }'
                printf '%s\n' '    let deleted = 0;'
                printf '%s\n' '    let cursor;'
                printf '%s\n' '    do {'
                printf '%s\n' '      const listed = await env.BUCKET.list({ cursor, limit: 1000 });'
                printf '%s\n' '      await Promise.all(listed.objects.map((object) => env.BUCKET.delete(object.key)));'
                printf '%s\n' '      deleted += listed.objects.length;'
                printf '%s\n' '      cursor = listed.truncated ? listed.cursor : undefined;'
                printf '%s\n' '    } while (cursor);'
                printf '%s\n' '    return Response.json({ deleted });'
                printf '%s\n' '  },'
                printf '%s\n' '};'
              } > "${cleanup_dir}/worker.js"

              {
                printf '%s\n' 'name = "timeamber-r2-cleanup"'
                printf '%s\n' 'main = "worker.js"'
                printf '%s\n' 'compatibility_date = "2024-12-30"'
                printf '%s\n' ''
                printf '%s\n' '[vars]'
                printf 'CLEANUP_TOKEN = "%s"\n' "${cleanup_token}"
                printf '%s\n' ''
                printf '%s\n' '[[r2_buckets]]'
                printf '%s\n' 'binding = "BUCKET"'
                printf 'bucket_name = "%s"\n' "${OLD_R2_BUCKET}"
              } > "${cleanup_dir}/wrangler.toml"

              deploy_output="$(npx wrangler deploy --config "${cleanup_dir}/wrangler.toml")"
              printf '%s\n' "$deploy_output"
              cleanup_url="$(printf '%s\n' "$deploy_output" | grep -Eo 'https://[^[:space:]]+\.workers\.dev' | head -n 1)"
              if [ -z "$cleanup_url" ]; then
                echo "Could not find cleanup Worker URL in deploy output."
                exit 1
              fi

              curl -fsS "${cleanup_url}/?token=${cleanup_token}"
              npx wrangler delete timeamber-r2-cleanup --force || true
              printf 'y\n' | npx wrangler r2 bucket delete "$OLD_R2_BUCKET"
            fi
          else
            echo "R2 bucket $OLD_R2_BUCKET not found."
          fi

      - name: Verify cleanup result
        working-directory: server
        run: |
          set -euo pipefail
          echo "Remaining Pages projects:"
          npx wrangler pages project list
          echo "Remaining D1 databases:"
          npx wrangler d1 list
          echo "Remaining R2 buckets:"
          npx wrangler r2 bucket list
          echo "Active site health:"
          curl -fsS https://timeamber.com/api/health
