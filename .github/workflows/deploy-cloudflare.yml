name: Cloudflare Deploy

# ⚠️ 状态：待测试（尚未端到端验证）
# 已知问题：
#   - Windows 用户反馈本地直跑脚本卡在「应用远程数据库迁移」（v2.3.0 已通过 shell:true 修复）
#   - CI 触发的端到端流程仍待主人验收
# 推荐部署姿势：本机 `npm run deploy:cloudflare`（详见 README）

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 部署到哪个 Pages 分支
        required: true
        default: main
        type: choice
        options:
          - main
          - dev
      skip_migrate:
        description: 跳过远程数据库迁移
        required: true
        default: false
        type: boolean
      skip_server:
        description: 跳过 Workers 部署
        required: true
        default: false
        type: boolean
      skip_client:
        description: 跳过 Pages 前端部署
        required: true
        default: false
        type: boolean
      api_base:
        description: 手动指定 API_BASE（可留空自动探测）
        required: false
        type: string
  push:
    branches:
      - main
    paths:
      - client/**
      - server/**
      - scripts/deploy-cloudflare.mjs
      - package.json
      - package-lock.json
      - .github/workflows/deploy-cloudflare.yml

concurrency:
  group: cloudflare-deploy-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy TimeAmber to Cloudflare
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      TIMEAMBER_API_BASE: ${{ github.event.inputs.api_base || '' }}
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --include=optional

      - name: Deploy via scripted pipeline
        run: |
          args=(--pages-project timeamber-client --branch "${TARGET_BRANCH}")
          if [ "${SKIP_MIGRATE}" = "true" ]; then args+=(--skip-migrate); fi
          if [ "${SKIP_SERVER}" = "true" ]; then args+=(--skip-server); fi
          if [ "${SKIP_CLIENT}" = "true" ]; then args+=(--skip-client); fi
          if [ -n "${TIMEAMBER_API_BASE}" ]; then args+=(--api-base "${TIMEAMBER_API_BASE}"); fi
          npm run deploy:cloudflare -- "${args[@]}"
        env:
          TARGET_BRANCH: ${{ github.event.inputs.branch || 'main' }}
          SKIP_MIGRATE: ${{ github.event.inputs.skip_migrate || 'false' }}
          SKIP_SERVER: ${{ github.event.inputs.skip_server || 'false' }}
          SKIP_CLIENT: ${{ github.event.inputs.skip_client || 'false' }}

      - name: Purge TimeAmber SEO cache
        if: ${{ success() }}
        run: |
          zone_id="$(curl -fsS -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            "https://api.cloudflare.com/client/v4/zones?name=timeamber.com" \
            | node -e "let s='';process.stdin.on('data',d=>s+=d);process.stdin.on('end',()=>{const r=JSON.parse(s);if(!r.success||!r.result?.[0]?.id) process.exit(1); process.stdout.write(r.result[0].id);})")"

          curl -fsS -X POST "https://api.cloudflare.com/client/v4/zones/${zone_id}/purge_cache" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"files":["https://timeamber.com/robots.txt","https://timeamber.com/sitemap.xml","https://timeamber.com/rss.xml"]}'
